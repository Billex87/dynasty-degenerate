<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dynasty Degens fantasy football command center</title>
  <desc id="desc">A branded social share card for Dynasty Degens.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#082f49"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="16%" cy="16%" r="55%">
