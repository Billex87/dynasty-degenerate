<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dynasty Degens Sleeper Helper</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { width: 320px; margin: 0; background: #07111f; color: #e5f2ff; }
      main { padding: 16px; display: grid; gap: 12px; }
      h1 { margin: 0; font-size: 16px; letter-spacing: -0.02em; }
      p { margin: 0; color: #a9bdd3; font-size: 12px; line-height: 1.45; }
      .badge { display: inline-flex; width: fit-content; border: 1px solid rgba(52, 211, 153, .35); border-radius: 999px; padding: 4px 8px; color: #a7f3d0; font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      .card { border: 1px solid rgba(148, 163, 184, .18); border-radius: 14px; padding: 12px; background: rgba(15, 23, 42, .72); }
      .status { font-weight: 800; color: #f8fafc; }
      button { width: 100%; border: 0; border-radius: 10px; padding: 10px 12px; font-weight: 800; cursor: pointer; color: #04111f; background: #6ee7b7; }
      button.secondary { background: rgba(148, 163, 184, .14); color: #e5f2ff; border: 1px solid rgba(148, 163, 184, .24); }
      button:disabled { opacity: .55; cursor: not-allowed; }
      #message { min-height: 18px; color: #a7f3d0; }
      .warn { color: #fbbf24; }
      .error { color: #fda4af; }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Read only MVP</span>
      <h1>Dynasty Degens Sleeper Helper</h1>
      <p>Use Dynasty Degens' Import Pending Transactions button for the one-click flow. This popup is only a manual fallback.</p>
      <section class="card">
        <p class="status" id="status">Checking for captured activity...</p>
        <p id="detail"></p>
      </section>
      <button id="send" disabled>Send Snapshot Manually</button>
      <button id="open" class="secondary">Open Dynasty Degens</button>
      <p id="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
