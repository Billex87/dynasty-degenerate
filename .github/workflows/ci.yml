name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Report validation
        run: pnpm run validate:report

      - name: Build
        run: pnpm run build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm exec playwright test tests/e2e/home.spec.ts tests/e2e/report-share-redraft.spec.ts tests/e2e/report-value-consistency.spec.ts --project=desktop-chrome --workers=1
